name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:
  workflow_dispatch:

jobs:
  public-repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject workstation-specific paths
        run: python3 scripts/check_public_repository_hygiene.py

  catalog-latency:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Verify public NAV API latency
        run: python3 scripts/check_catalog_latency.py --samples 20 --max-average-ms 200

  build-contracts:
    runs-on: ubuntu-latest
    env:
      RUST_TOOLCHAIN: nightly-2025-11-17
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly-2025-11-17
          target: wasm32-unknown-unknown
          override: true
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('contracts/**/Cargo.lock') }}
      - name: Run contract tests
        run: |
          cd contracts
          cargo test --workspace
      - name: Validate contract API surface
        run: python3 scripts/contract_api_surface_gate.py --strict
      - name: Build WASM
        run: |
          BUILD_CONTRACT_SET=production bash scripts/build-wasm.sh
      - name: Run release script tests
        run: python3 -m unittest discover -s scripts/tests
      - name: Run internal security audit
        run: python3 scripts/internal_security_audit.py --strict
      - name: Validate mainnet manifest
        run: python3 scripts/validate_mainnet_manifest.py --manifest deployments.mainnet.json --phase postdeploy
      - name: Run mainnet release gate
        run: python3 scripts/mainnet_release_gate.py --manifest deployments.mainnet.json

  catalog-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/catalog-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/catalog-api/package-lock.json
      - run: npm ci
      - run: npm run test:unit
      - run: npm run test:integration

  typescript-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - run: npm ci
      - run: npm run test:unit
      - run: npm run test:consumer
      - run: npm run test:examples
      - run: npm run docs:api
      - run: npm run verify:mainnet-preset

  platform-material:
    runs-on: ubuntu-latest
    needs: [catalog-api, typescript-sdk]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            services/catalog-api/package-lock.json
            sdk/typescript/package-lock.json
      - name: Build catalog OpenAPI source
        working-directory: services/catalog-api
        run: npm ci && npm run build
      - name: Generate SDK reference
        working-directory: sdk/typescript
        run: npm ci && npm run docs:api
      - name: Verify public platform material
        run: node scripts/verify-docs-site.mjs
