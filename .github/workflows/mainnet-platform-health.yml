name: Mainnet Platform Health

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read

jobs:
  verify-mainnet-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            services/catalog-api/package-lock.json
            sdk/typescript/package-lock.json
      - name: Build Catalog API
        working-directory: services/catalog-api
        run: npm ci && npm run build
      - name: Build SDK and reference
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run test:unit
          npm run test:consumer
          npm run test:examples
          npm run docs:api
          npm run example:mainnet
      - name: Measure live Mainnet services
        run: node scripts/build-platform-status.mjs
      - name: Verify generated platform material
        run: node scripts/verify-docs-site.mjs
      - name: Verify public platform video
        run: |
          headers="$(curl --fail --silent --show-error --head \
            --retry 4 --retry-all-errors --retry-delay 3 \
            --connect-timeout 15 --max-time 60 \
            https://arka.fund/arka-developer-platform-overview.mp4)"
          grep -qi '^content-type: video/mp4' <<<"$headers"
          grep -qi '^accept-ranges: bytes' <<<"$headers"
      - name: Upload platform status
        uses: actions/upload-artifact@v4
        with:
          name: arkafund-mainnet-status
          path: |
            docs-site/openapi.json
            docs-site/contracts-mainnet.json
            docs-site/system-status.json
            docs-site/pagerduty-monitoring-cycle.json
            docs-site/published-sdk-mainnet-canary.json
            docs-site/mainnet-curated-arkas-20260718.json
          if-no-files-found: error
          retention-days: 90
